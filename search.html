<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/assets/css/main.css" />
    <link rel="stylesheet" href="/assets/css/ours.css" />
    <title>Search</title>
    <style>
        .search-container {
            text-align: center;
            padding: 2rem;
            position: relative;
        }
        .search-bar {
            width: 80%;
            padding: 0.5rem;
            font-size: 1rem;
            margin-bottom: 1rem;
        }
        #results {
            text-align: left;
            margin: 0 auto;
            max-width: 80%;
        }
        #results div {
            padding: 0.5rem;
            border-bottom: 1px solid #ddd;
        }
        #results div.active {
            background-color: #f0f0f0;
        }
        .suggestion-box {
    position: absolute;
    background: transparent;  /* Changed from white to transparent */
    border: 1px solid #ddd;
    max-width: 80%;
    z-index: 1000;
    margin: 0 auto;
    left: 10%;
}

        .suggestion-box div {
            padding: 0.5rem;
            cursor: pointer;
        }
        .suggestion-box div:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>
    <nav>
        <!-- Include your nav.html content here -->
    </nav>
    <div class="search-container">
        <h1>Search</h1>
        <input type="text" id="searchInput" class="search-bar" placeholder="Search here..." oninput="performSearch()" />
        <div id="results"></div>
    </div>

    <script>
       // Function to fetch content from each page using AJAX (fetch)
async function fetchPageContent(url) {
    try {
        const response = await fetch(url);
        if (!response.ok) {
            throw new Error(`Failed to fetch ${url}`);
        }
        const text = await response.text();

        // Use a DOM parser to extract the text content of the page (from a specific element or the entire body)
        const parser = new DOMParser();
        const doc = parser.parseFromString(text, 'text/html');

        // Extract text from the body (or a specific element, e.g., <main>, <article>, etc.)
        const bodyText = doc.body.innerText || doc.body.textContent;

        return bodyText;
    } catch (error) {
        console.error(error);
        return '';
    }
}

// Function to populate the pages array with dynamic content fetched from each page
async function populatePages() {
    const pages = [
        { title: "Home", url: "/index.html" },
        { title: "Blog", url: "/blog/blog.html" },
        { title: "About Us", url: "/about.html" },
        { title: "Our Gallery", url: "/gallery/gallery.html" },
        { title: "Resources", url: "/resources.html" },
        { title: "Our Journey", url: "/timeline.html" }
    ];

    // Fetch and add content to each page
    for (const page of pages) {
        page.content = await fetchPageContent(page.url); // Fetch and add content
    }

    return pages;
}

// Function to perform search and show relevant results with snippets
async function performSearch() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const resultsDiv = document.getElementById('results');
    resultsDiv.innerHTML = '';
    currentIndex = -1;

    const pages = await populatePages();

    const results = pages.filter(page => {
        return page.title.toLowerCase().includes(query) || page.content.toLowerCase().includes(query);
    });

    if (query) {
        // Fetch AI-enhanced results
        const aiResponse = await fetch('/ai-search', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query }),
        }).then(res => res.json()).catch(err => console.error(err));

        if (aiResponse?.aiResponse) {
            const aiDiv = document.createElement('div');
            aiDiv.innerHTML = `
                <div style="border: 1px solid #ddd; padding: 1rem; background: #f9f9f9;">
                    <h4>AI-Enhanced Suggestion:</h4>
                    <p>${aiResponse.aiResponse}</p>
                </div>
            `;
            resultsDiv.appendChild(aiDiv);
        }

        // Display traditional results
        if (results.length) {
            results.forEach(page => {
                const resultItem = document.createElement('div');
                resultItem.innerHTML = `
                    <div>
                        <a href="${page.url}"><strong>${page.title}</strong></a>
                        <p>${page.content.substring(0, 200)}...</p>
                    </div>`;
                resultsDiv.appendChild(resultItem);
            });
        } else {
            resultsDiv.innerHTML += "<p>No results found.</p>";
        }
    }
}





        document.addEventListener('keydown', (e) => {
            const results = document.querySelectorAll('#results div');
            if (results.length > 0) {
                if (e.key === 'ArrowDown') {
                    currentIndex = (currentIndex + 1) % results.length;
                    updateActiveResult(results);
                } else if (e.key === 'ArrowUp') {
                    currentIndex = (currentIndex - 1 + results.length) % results.length;
                    updateActiveResult(results);
                } else if (e.key === 'Enter' && currentIndex >= 0) {
                    results[currentIndex].querySelector('a').click();
                }
            }
        });

        function updateActiveResult(results) {
            results.forEach((result, index) => {
                result.classList.toggle('active', index === currentIndex);
            });
        }
    </script>
</body>
</html>
